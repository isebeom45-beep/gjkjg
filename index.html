<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏐 THE SPIKE: HIGH-GRAPHIC EDITION v7.7 🏐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        
        body { 
            background: #090d16; 
            color: #ffffff; 
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }
        
        /* 🏠 프리미엄 홈 화면 */
        #home-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; animation: fadeIn 0.8s ease-out; width: 100%; height: 100vh; z-index: 10; }
        #home-screen h1 { font-size: 5.5rem; font-weight: 900; font-style: italic; letter-spacing: 4px; background: linear-gradient(45deg, #00f2fe, #4facfe, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; text-shadow: 0 10px 30px rgba(0, 242, 254, 0.2); }
        #home-screen .subtitle { font-size: 1.1rem; font-weight: 800; color: #38bdf8; letter-spacing: 16px; margin-bottom: 35px; text-transform: uppercase; opacity: 0.9; }
        
        .main-layout { display: flex; align-items: center; justify-content: center; gap: 60px; background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.9)); padding: 45px 55px; border-radius: 36px; border: 2px solid rgba(56, 189, 248, 0.4); box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 30px rgba(56, 189, 248, 0.05); backdrop-filter: blur(20px); }
        .preview-box { display: flex; flex-direction: column; align-items: center; }
        #customCanvas { background: radial-gradient(circle, #1e293b 0%, #030712 100%); border: 3px solid #38bdf8; border-radius: 24px; box-shadow: 0 15px 40px rgba(0, 242, 254, 0.25); }
        .custom-title { font-size: 1.2rem; font-weight: 900; color: #00f2fe; margin-bottom: 18px; letter-spacing: 4px; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
        
        .selector-row { display: flex; align-items: center; justify-content: space-between; width: 380px; background: rgba(2, 6, 23, 0.8); border: 2px solid #334155; border-radius: 16px; padding: 12px 20px; margin-bottom: 16px; transition: border 0.2s; }
        .selector-row:hover { border-color: #38bdf8; }
        .selector-label { font-size: 0.85rem; font-weight: 800; color: #64748b; letter-spacing: 1px; }
        .selector-value { font-size: 1.1rem; font-weight: 800; color: #f8fafc; width: 170px; text-align: center; }
        .arrow-btn { background: #1e293b; border: 1px solid #475569; color: #f8fafc; font-size: 1.2rem; font-weight: 900; width: 42px; height: 42px; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
        .arrow-btn:hover { background: #38bdf8; color: #090d16; border-color: #38bdf8; transform: scale(1.05); }
        
        .menu-container { display: flex; flex-direction: column; gap: 14px; justify-content: center; }
        .menu-btn { width: 380px; padding: 19px; font-size: 1.3rem; font-weight: 800; color: #f8fafc; background: #1e293b; border: 2px solid #475569; border-radius: 18px; cursor: pointer; transition: all 0.25s ease; }
        .menu-btn:hover { border-color: #00f2fe; color: #00f2fe; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(0,242,254,0.15); }
        .play-btn { background: linear-gradient(135deg, #00f2fe, #4facfe); border: none; color: #090d16; font-weight: 900; }
        .play-btn:hover { box-shadow: 0 15px 30px rgba(0,242,254,0.4); color: #090d16; }
        .story-mode-btn { background: linear-gradient(135deg, #f43f5e, #fb7185); border: none; color: #fff; font-weight: 900; }
        .story-mode-btn:hover { box-shadow: 0 15px 30px rgba(244,63,94,0.4); }

        /* 🏫 스토리 모드 */
        #story-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100vh; z-index: 10; }
        .school-grid { display: grid; grid-template-columns: repeat(3, 310px); gap: 25px; margin: 30px 0; }
        .school-card { background: rgba(15, 23, 42, 0.95); border: 2px solid #334155; border-radius: 26px; padding: 25px 20px; text-align: center; cursor: pointer; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.25s; }
        .school-card:hover { border-color: #38bdf8; transform: translateY(-6px); background: #1e293b; box-shadow: 0 15px 35px rgba(56,189,248,0.2); }
        .back-btn { background: #1e293b; color:#fff; border: 2px solid #475569; padding: 16px 60px; border-radius: 16px; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .back-btn:hover { border-color: #fff; background: #334155; }

        #dialogue-screen { display: none; flex-direction: column; align-items: center; justify-content: flex-end; width: 100%; height: 100vh; position: absolute; left: 0; top: 0; background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(8px); z-index: 100; padding-bottom: 80px; }
        .dialogue-box { width: 1000px; max-width: 92%; background: #1e293b; border: 3px solid #38bdf8; border-radius: 28px; padding: 40px 45px; position: relative; cursor: pointer; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .dialogue-name { font-size: 1.4rem; font-weight: 900; color: #fff; background: #38bdf8; display: inline-block; padding: 6px 24px; border-radius: 12px; margin-bottom: 18px; }
        .dialogue-text { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; min-height: 80px; line-height: 1.7; }

        /* 🎮 인게임 컨테이너 */
        #game-container { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; position: relative; background: #020617; }
        
        #score-board { font-size: 5rem; font-weight: 900; margin-bottom: 10px; display: flex; gap: 460px; font-style: italic; z-index: 5; position: relative; }
        let-score { color: #38bdf8; text-shadow: 0 0 25px rgba(56,189,248,0.7); } #p2-score { color: #f43f5e; text-shadow: 0 0 25px rgba(244,63,94,0.7); }
        
        #gameCanvas { background: #020617; border: 5px solid #1e293b; border-radius: 28px; box-shadow: 0 50px 100px rgba(0,0,0,0.9); z-index: 4; position: relative; }
        
        #control-info { margin-top: 18px; display: flex; justify-content: space-between; width: 1700px; max-width: 95%; color: #64748b; font-size: 1.1rem; font-weight: bold; z-index: 5; position: relative; }
        .key { background: #1e293b; padding: 4px 16px; border-radius: 8px; color: #fff; border: 2px solid #475569; margin: 0 4px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="home-screen">
        <h1>THE SPIKE</h1>
        <p class="subtitle">HIGH-GRAHIC EDITION v7.7</p>
        
        <div class="main-layout">
            <div class="preview-box">
                <div class="custom-title">⚡ PLAYER CUSTOM</div>
                <canvas id="customCanvas" width="300" height="360"></canvas>
            </div>
            
            <div class="menu-container">
                <div class="selector-row">
                    <button class="arrow-btn" onclick="prevHair()">&lt;</button>
                    <div class="preview-details">
                        <div class="selector-label">HAIR STYLE</div>
                        <div id="hair-name" class="selector-value">파이어 스파이키</div>
                    </div>
                    <button class="arrow-btn" onclick="nextHair()">&gt;</button>
                </div>

                <div class="selector-row">
                    <button class="arrow-btn" onclick="prevCloth()">&lt;</button>
                    <div class="preview-details">
                        <div class="selector-label">UNIFORM COLOR</div>
                        <div id="cloth-name" class="selector-value">사이버 아쿠아</div>
                    </div>
                    <button class="arrow-btn" onclick="nextCloth()">&gt;</button>
                </div>
                
                <div style="height: 5px;"></div>
                <button class="menu-btn story-mode-btn" onclick="openStoryMenu()">🏆 CHAMPIONSHIP MODE</button>
                <button class="menu-btn play-btn" onclick="startGame(1)">⚡ START GAME (VS HARD AI)</button>
                <button class="menu-btn play-btn" onclick="startGame(2)">💙 LOCAL 2 PLAYERS</button>
            </div>
        </div>
    </div>

    <div id="story-screen">
        <h2 style="font-size: 3rem; font-style: italic; color: #38bdf8; margin-bottom: 15px; letter-spacing: 2px;">CHAMPIONSHIP MATCH</h2>
        <div class="school-grid" id="school-grid-container"></div>
        <button class="back-btn" onclick="closeStoryMenu()">BACK TO MAIN</button>
    </div>

    <div id="dialogue-screen" onclick="progressDialogue()">
        <canvas id="captain-canvas" width="320" height="380"></canvas>
        <div class="dialogue-box">
            <div class="dialogue-name" id="diag-name">주장</div>
            <div class="dialogue-text" id="diag-text">내용</div>
            <div style="position: absolute; bottom: 15px; right: 25px; color: #38bdf8; font-weight: bold; font-size: 0.95rem; letter-spacing: 1px;">NEXT 💬</div>
        </div>
    </div>

    <div id="game-container">
        <div id="score-board">
            <span id="p1-score">00</span>
            <span id="p2-score">00</span>
        </div>
        <canvas id="gameCanvas" width="1700" height="850"></canvas>
        <div id="control-info">
            <span>🧡 1P: <span class="key">A</span><span class="key">D</span> 이동 / <span class="key">W</span> 점프 / 네트앞 타점에서 <span class="key">T</span> 속공</span>
            <span style="color:#00f2fe; font-weight: 900; letter-spacing: 1px;">⚡ HIGH-END VECTOR ENGINE ACTIVE</span>
            <span>💙 2P: <span class="key">◀</span><span class="key">▶</span> 이동 / <span class="key">▲</span> 점프 / <span class="key">Enter</span> 스파이크</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const customCanvas = document.getElementById('customCanvas');
        const cCtx = customCanvas.getContext('2d');
        const capCanvas = document.getElementById('captain-canvas');
        const capCtx = capCanvas.getContext('2d');

        const p1ScoreTxt = document.getElementById('p1-score');
        const p2ScoreTxt = document.getElementById('p2-score');

        // 🔥 고화질 커스터마이징 데이터셋
        const hairStyles = [
            { name: "파이어 스파이키", color: "#ff5722", style: "spiky" },
            { name: "엔젤 하이라이트", color: "#e91e63", style: "angel" },
            { name: "에메랄드 섀도우", color: "#00e676", style: "wave" },
            { name: "골드 블리치", color: "#ffea00", style: "mohawk" }
        ];
        const clothStyles = [
            { name: "사이버 아쿠아", color: "#00f2fe", num: "01" },
            { name: "바이올렛 네온", color: "#9c27b0", num: "07" },
            { name: "인페르노 레드", color: "#f44336", num: "10" }
        ];

        const rivalSchools = [
            {
                name: "1. 네오 테크 고교", desc: "🛡️ 하이테크 리시브 마스터", captain: "카이엔", hair: "#00e676", hairStyle: "mohawk", cloth: "#334155",
                dialogues: [
                    { speaker: "카이엔", text: "고화질 데이터 연산 완료. 너희의 움직임은 선명하게 보인다." },
                    { speaker: "강태양 (주인공)", text: "화질이 좋아진 만큼 내 속공 스피드도 엄청날 거다!" }
                ],
                aiConfig: { speed: 12.0, jump: -18.0, power: 31 }
            },
            {
                name: "2. 크림슨 스매시", desc: "🔥 무조건적인 파괴력 오픈 팀", captain: "류 가온", hair: "#ff1744", hairStyle: "spiky", cloth: "#881337",
                dialogues: [
                    { speaker: "류 가온", text: "완벽한 타점에서 코트 바닥을 깨부숴주지!" },
                    { speaker: "강태양 (주인공)", text: "네트 앞에서 먼저 띄워 속공으로 받아친다!" }
                ],
                aiConfig: { speed: 11.5, jump: -19.0, power: 35 }
            },
            {
                name: "3. 피닉스 다이너스티", desc: "👑 전국 정상 최강의 올라운더", captain: "불사조", hair: "#ffea00", hairStyle: "angel", cloth: "#451a03",
                dialogues: [
                    { speaker: "불사조", text: "여기가 최종 도달점이다. 너희의 최고의 플레이를 보여봐라." },
                    { speaker: "강태양 (주인공)", text: "모든 준비는 끝났다. 트로피를 가져가겠어!" }
                ],
                aiConfig: { speed: 14.5, jump: -20.5, power: 37 }
            }
        ];

        let currentHairIdx = 0; let currentClothIdx = 0;
        let gameMode = 1; let isGameRunning = false; let activeSchool = null; let dialogueIndex = 0;

        const BASE_GRAVITY = 0.44; const FLOOR_Y = canvas.height - 110;
        const NET_W = 14; const NET_H = 270;
        const NET_X = canvas.width / 2; 

        let score = { p1: 0, p2: 0 };
        let gameMsg = "MATCH START"; let msgTimer = 100;
        let currentServer = 1; let isServingPhase = true;
        let animFrame = 0;
        
        let teamTouchCount = { left: 0, right: 0 }; 
        let scoreLock = false; 
        let ballTouchCooldown = 0; 

        let aiSpeed = 12.5; let aiJumpPower = -17.5; let p2SpikePower = -29;

        // 🖌️ [v7.7 초고퀄리티 플레이어 렌더링 시스템]
        function drawHighQualityPlayer(targetCtx, x, y, isJumping, vy, clothColor, side, spikingTimer, hairColor, hStyle = "spiky", uniformNum = "01", scale = 1) {
            targetCtx.save(); targetCtx.scale(scale, scale);
            let dir = (side === 'left') ? 1 : -1;
            let legWalk = Math.sin(animFrame * 0.2) * 9;
            let isSpiking = spikingTimer > 0;

            // 1. 다이내믹 바닥 그림자 (거리 비례 투명도 조절)
            let shadowAlpha = isJumping ? Math.max(0.1, 0.4 - Math.abs(vy)*0.02) : 0.45;
            targetCtx.fillStyle = `rgba(0, 0, 0, ${shadowAlpha})`;
            targetCtx.beginPath();
            targetCtx.ellipse(x, FLOOR_Y + 5, isJumping ? 16 : 40, 8, 0, 0, Math.PI * 2);
            targetCtx.fill();

            // 2. 사지 관절 수려한 라인 드로잉
            targetCtx.lineWidth = 8; targetCtx.lineCap = "round"; targetCtx.lineJoin = "round";
            targetCtx.strokeStyle = "#090d16"; 
            let hipY = y + 42;
            
            // 다리/하체 레이어
            targetCtx.beginPath();
            if (isJumping) {
                targetCtx.moveTo(x - 9, hipY); targetCtx.lineTo(x - 18, hipY + 16); targetCtx.lineTo(x - 12, hipY + 34);
                targetCtx.moveTo(x + 9, hipY); targetCtx.lineTo(x + 6, hipY + 18); targetCtx.lineTo(x + 16, hipY + 34);
            } else {
                targetCtx.moveTo(x - 9, hipY); targetCtx.lineTo(x - 12 + legWalk, hipY + 18); targetCtx.lineTo(x - 9 + legWalk, hipY + 40);
                targetCtx.moveTo(x + 9, hipY); targetCtx.lineTo(x + 12 - legWalk, hipY + 18); targetCtx.lineTo(x + 9 - legWalk, hipY + 40);
            }
            targetCtx.stroke();

            // 바지 드로잉
            targetCtx.fillStyle = "#1e293b"; targetCtx.beginPath(); targetCtx.roundRect(x - 18, y + 20, 36, 24, 5); targetCtx.fill();

            // 3. 프리미엄 상체 유니폼 그라데이션 및 테두리선
            let bodyGrad = targetCtx.createLinearGradient(x - 18, y, x + 18, y);
            bodyGrad.addColorStop(0, clothColor);
            bodyGrad.addColorStop(0.5, "#ffffff");
            bodyGrad.addColorStop(1, clothColor);
            
            targetCtx.fillStyle = bodyGrad;
            targetCtx.strokeStyle = "rgba(255,255,255,0.25)";
            targetCtx.lineWidth = 1.5;
            targetCtx.beginPath(); targetCtx.roundRect(x - 18, y - 32, 36, 54, 8); targetCtx.fill(); targetCtx.stroke();

            // 등번호 / 앞번호 마킹
            targetCtx.fillStyle = "rgba(0,0,0,0.6)";
            targetCtx.font = "900 14px sans-serif";
            ctx.textAlign = "center";
            targetCtx.fillText(uniformNum, x - (2 * dir), y + 2);

            // 4. 리얼 스킨 톤 페이스 및 눈동자 레이어
            targetCtx.fillStyle = "#fcd4b4"; 
            targetCtx.beginPath(); targetCtx.arc(x, y - 54, 15, 0, Math.PI * 2); targetCtx.fill();
            
            // 애니메이션 눈(Eye) 레이어
            targetCtx.fillStyle = "#090d16";
            targetCtx.beginPath();
            targetCtx.arc(x + (7 * dir), y - 56, 2.5, 0, Math.PI*2);
            targetCtx.fill();
            
            // 5. 입체 커스텀 헤어스타일 폴리곤 처리
            targetCtx.fillStyle = hairColor;
            targetCtx.beginPath();
            if (hStyle === "spiky") {
                targetCtx.moveTo(x - 16, y - 56); targetCtx.lineTo(x - 24, y - 72); targetCtx.lineTo(x - 8, y - 66);
                targetCtx.lineTo(x, y - 82); targetCtx.lineTo(x + 8, y - 66); targetCtx.lineTo(x + 24, y - 72);
                targetCtx.lineTo(x + 16, y - 56);
            } else if (hStyle === "angel") {
                targetCtx.arc(x, y - 62, 17, Math.PI, 0);
                targetCtx.lineTo(x + 18, y - 46); targetCtx.lineTo(x - 18, y - 46);
            } else if (hStyle === "mohawk") {
                targetCtx.moveTo(x - 6, y - 56); targetCtx.lineTo(x - 4, y - 86); targetCtx.lineTo(x + 4, y - 86); targetCtx.lineTo(x + 6, y - 56);
            } else { // wave style
                targetCtx.arc(x - 4, y - 60, 16, 0, Math.PI*2);
                targetCtx.arc(x + 6, y - 62, 14, 0, Math.PI*2);
            }
            targetCtx.fill();

            // 6. 팔 매커니즘 고도화
            targetCtx.strokeStyle = "#fcd4b4"; targetCtx.lineWidth = 6.5; targetCtx.beginPath();
            if (isSpiking) {
                targetCtx.moveTo(x - (10 * dir), y - 14); targetCtx.lineTo(x + (28 * dir), y - 78); targetCtx.lineTo(x + (50 * dir), y - 20);
            } else {
                targetCtx.moveTo(x - (14 * dir), y - 10); targetCtx.lineTo(x + (18 * dir), y + 16);
            }
            targetCtx.stroke(); targetCtx.restore();
        }

        function openStoryMenu() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('story-screen').style.display = 'flex';
            const container = document.getElementById('school-grid-container'); container.innerHTML = "";
            rivalSchools.forEach((school, index) => {
                let card = document.createElement('div'); card.className = "school-card";
                card.onclick = () => selectSchoolStory(index);
                card.innerHTML = `<div class="school-name" style="color:#00f2fe; font-weight:900; font-size:1.3rem; margin-bottom: 8px;">${school.name}</div><div style="font-size:0.9rem; color:#94a3b8; font-weight: bold;">${school.desc}</div>`;
                container.appendChild(card);
            });
        }

        function closeStoryMenu() { document.getElementById('story-screen').style.display = 'none'; document.getElementById('home-screen').style.display = 'flex'; }
        function selectSchoolStory(index) { activeSchool = rivalSchools[index]; dialogueIndex = 0; document.getElementById('story-screen').style.display = 'none'; document.getElementById('dialogue-screen').style.display = 'flex'; renderDialogueStep(); }

        function renderDialogueStep() {
            const currentDiag = activeSchool.dialogues[dialogueIndex];
            document.getElementById('diag-name').textContent = currentDiag.speaker;
            document.getElementById('diag-text').textContent = `"${currentDiag.text}"`;
            capCtx.clearRect(0, 0, capCanvas.width, capCanvas.height);
            if (currentDiag.speaker.includes("강태양")) {
                document.getElementById('diag-name').style.background = "#4facfe";
                drawHighQualityPlayer(capCtx, capCanvas.width/4.6, capCanvas.height/4, false, 0, clothStyles[currentClothIdx].color, 'left', 0, hairStyles[currentHairIdx].color, hairStyles[currentHairIdx].style, clothStyles[currentClothIdx].num, 2.3);
            } else {
                document.getElementById('diag-name').style.background = "#f43f5e";
                drawHighQualityPlayer(capCtx, capCanvas.width/4.6, capCanvas.height/4, false, 0, activeSchool.cloth, 'right', 0, activeSchool.hair, activeSchool.hairStyle, "99", 2.3);
            }
        }

        function progressDialogue() { if (dialogueIndex < activeSchool.dialogues.length - 1) { dialogueIndex++; renderDialogueStep(); } else { document.getElementById('dialogue-screen').style.display = 'none'; startGame(3); } }

        function updateCustomUI() { document.getElementById('hair-name').textContent = hairStyles[currentHairIdx].name; document.getElementById('cloth-name').textContent = clothStyles[currentClothIdx].name; }
        function drawCustomRoom() { cCtx.clearRect(0, 0, customCanvas.width, customCanvas.height); animFrame++; drawHighQualityPlayer(cCtx, customCanvas.width/4.8, customCanvas.height/4, false, 0, clothStyles[currentClothIdx].color, 'left', 0, hairStyles[currentHairIdx].color, hairStyles[currentHairIdx].style, clothStyles[currentClothIdx].num, 2.3); if(!isGameRunning && document.getElementById('home-screen').style.display !== 'none') requestAnimationFrame(drawCustomRoom); }
        function nextHair() { currentHairIdx = (currentHairIdx + 1) % hairStyles.length; updateCustomUI(); }
        function prevHair() { currentHairIdx = (currentHairIdx - 1 + hairStyles.length) % hairStyles.length; updateCustomUI(); }
        function nextCloth() { currentClothIdx = (currentClothIdx + 1) % clothStyles.length; updateCustomUI(); }
        function prevCloth() { currentClothIdx = (currentClothIdx - 1 + clothStyles.length) % clothStyles.length; updateCustomUI(); }

        updateCustomUI(); drawCustomRoom();

        class Spiker {
            constructor(x, color, side) { this.x = x; this.y = FLOOR_Y - 42; this.radius = 28; this.vx = 0; this.vy = 0; this.isJumping = false; this.color = color; this.side = side; this.speed = 9.5; this.spikingVisualTimer = 0; }
            update(ignoreLimits = false) {
                this.x += this.vx; this.y += this.vy; this.vy += BASE_GRAVITY;
                if (this.y > FLOOR_Y - 42) { this.y = FLOOR_Y - 42; this.vy = 0; this.isJumping = false; }
                if (!ignoreLimits) {
                    let leftLimit = 60; let rightLimit = canvas.width/2 - 60;
                    if (this.side === 'right') { leftLimit = canvas.width/2 + 60; rightLimit = canvas.width - 60; }
                    if (this.x < leftLimit) this.x = leftLimit; if (this.x > rightLimit) this.x = rightLimit;
                }
                if (this.spikingVisualTimer > 0) this.spikingVisualTimer--; this.vx = 0;
            }
            draw() { 
                let hColor = (this.side === 'left') ? hairStyles[currentHairIdx].color : (activeSchool ? activeSchool.hair : "#f43f5e"); 
                let hStyle = (this.side === 'left') ? hairStyles[currentHairIdx].style : (activeSchool ? activeSchool.hairStyle : "spiky");
                let uNum = (this.side === 'left') ? clothStyles[currentClothIdx].num : "05";
                drawHighQualityPlayer(ctx, this.x, this.y, this.isJumping, this.vy, this.color, this.side, this.spikingVisualTimer, hColor, hStyle, uNum); 
            }
        }

        const players = { p1: new Spiker(180, '#00f2fe', 'left'), p2: new Spiker(1520, '#f43f5e', 'right') };
        
        const setters = [
            { x: 620, y: FLOOR_Y - 42, color: '#00f2fe', base: 620, side: 'left', isJumping: false, vy: 0, spikingVisualTimer: 0 },
            { x: 1080, y: FLOOR_Y - 42, color: '#fda4af', base: 1080, side: 'right', isJumping: false, vy: 0, spikingVisualTimer: 0 }
        ];

        const ball = { x: 200, y: 320, vx: 0, vy: 0, radius: 19, isSmashed: false, rotation: 0 };
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function startGame(mode) {
            gameMode = mode; isGameRunning = true; score.p1 = 0; score.p2 = 0; scoreLock = false; ballTouchCooldown = 0;
            p1ScoreTxt.textContent = "00"; p2ScoreTxt.textContent = "00";
            players.p1.color = clothStyles[currentClothIdx].color;
            
            if(gameMode === 3 && activeSchool) {
                players.p2.color = activeSchool.cloth;
                aiSpeed = activeSchool.aiConfig.speed;
                aiJumpPower = activeSchool.aiConfig.jump;
                p2SpikePower = -activeSchool.aiConfig.power;
            } else {
                aiSpeed = 12.5; aiJumpPower = -17.5; p2SpikePower = -29;
            }

            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            initServe(); loop();
        }

        function triggerHit(type) { gameMsg = type; msgTimer = 55; ball.isSmashed = true; }
        
        function triggerScore(winner) {
            if (scoreLock) return;
            scoreLock = true; 
            
            if (winner === 'p1') { score.p1++; p1ScoreTxt.textContent = score.p1 < 10 ? '0' + score.p1 : score.p1; currentServer = 1; } 
            else { score.p2++; p2ScoreTxt.textContent = score.p2 < 10 ? '0' + score.p2 : score.p2; currentServer = 2; }
            
            gameMsg = "🎉 SCORE POINT";
            msgTimer = 75; 

            setTimeout(() => {
                if (score.p1 >= 15 || score.p2 >= 15) { 
                    isGameRunning = false; scoreLock = false;
                    document.getElementById('game-container').style.display = 'none'; 
                    document.getElementById('home-screen').style.display = 'flex'; 
                    drawCustomRoom(); 
                } else { initServe(); scoreLock = false; }
            }, 1400); 
        }

        function initServe() {
            isServingPhase = true; ball.isSmashed = false; ball.vy = 0; ball.vx = 0; ballTouchCooldown = 0;
            teamTouchCount.left = 0; teamTouchCount.right = 0;
            
            players.p1.x = 240; players.p1.y = FLOOR_Y - 42; players.p1.vy = 0; players.p1.isJumping = false;
            players.p2.x = 1460; players.p2.y = FLOOR_Y - 42; players.p2.vy = 0; players.p2.isJumping = false;
            
            setters[0].x = setters[0].base; setters[0].y = FLOOR_Y - 42; setters[0].vy = 0; setters[0].isJumping = false;
            setters[1].x = setters[1].base; setters[1].y = FLOOR_Y - 42; setters[1].vy = 0; setters[1].isJumping = false;

            if (currentServer === 1) { players.p1.x = 120; ball.x = 120; ball.y = players.p1.y - 45; } 
            else { players.p2.x = 1580; ball.x = 1580; ball.y = players.p2.y - 45; }
        }

        function update() {
            animFrame++;
            if (scoreLock) return; 
            if (ballTouchCooldown > 0) ballTouchCooldown--;

            if (keys['a']) players.p1.vx = -players.p1.speed; if (keys['d']) players.p1.vx = players.p1.speed;
            if (keys['w'] && !players.p1.isJumping) { players.p1.vy = -16.5; players.p1.isJumping = true; }

            let aiSpikeTrigger = false;
            if (gameMode === 2) {
                if (keys['arrowleft']) players.p2.vx = -players.p2.speed; if (keys['arrowright']) players.p2.vx = players.p2.speed;
                if (keys['arrowup'] && !players.p2.isJumping) { players.p2.vy = -16.5; players.p2.isJumping = true; }
            } else {
                if (!isServingPhase) {
                    if (ball.x > canvas.width / 2) {
                        let targetPrediction = ball.x + (ball.vx * 1.4);
                        if (players.p2.x < targetPrediction - 8) players.p2.vx = aiSpeed;
                        else if (players.p2.x > targetPrediction + 8) players.p2.vx = -aiSpeed;
                        
                        if (ball.y < players.p2.y - 30 && Math.abs(ball.x - players.p2.x) < 110) {
                            if (!players.p2.isJumping) { players.p2.vy = aiJumpPower; players.p2.isJumping = true; }
                            if (players.p2.isJumping && ball.y < players.p2.y - 35) aiSpikeTrigger = true;
                        }
                    }
                } else if (currentServer === 2 && !players.p2.isJumping) { 
                    players.p2.vy = -16.5; players.p2.isJumping = true; 
                }
            }

            if (isServingPhase) {
                if (currentServer === 1) {
                    players.p1.update(true); ball.x = players.p1.x + 25; ball.y = players.p1.y - 45;
                    if (players.p1.isJumping && players.p1.vy >= -4) { 
                        ball.vx = 29; ball.vy = 2.0; isServingPhase = false; 
                        players.p1.spikingVisualTimer = 18; teamTouchCount.left = 1; ballTouchCooldown = 25; triggerHit("💥 POWER SERVE"); 
                    }
                } else {
                    players.p2.update(true); ball.x = players.p2.x - 25; ball.y = players.p2.y - 45;
                    if (players.p2.isJumping && players.p2.vy >= -4) { 
                        ball.vx = -29; ball.vy = 2.0; isServingPhase = false;
                        players.p2.spikingVisualTimer = 18; teamTouchCount.right = 1; ballTouchCooldown = 25; triggerHit("💥 POWER SERVE"); 
                    }
                }
                return; 
            }

            players.p1.update(false); players.p2.update(false);
            ball.y += ball.vy; ball.vy += BASE_GRAVITY * 0.65; ball.x += ball.vx; ball.rotation += ball.vx * 0.03;

            if (ball.y + ball.radius > FLOOR_Y - NET_H) {
                if (ball.x + ball.radius >= NET_X - NET_W/2 && ball.x - ball.radius < NET_X && ball.vx > 0) {
                    ball.x = NET_X - NET_W/2 - ball.radius; ball.vx = -ball.vx * 0.4; ball.vy = -3;
                    triggerHit("🥅 NET BOUNCE");
                }
                else if (ball.x - ball.radius <= NET_X + NET_W/2 && ball.x + ball.radius > NET_X && ball.vx < 0) {
                    ball.x = NET_X + NET_W/2 + ball.radius; ball.vx = -ball.vx * 0.4; ball.vy = -3;
                    triggerHit("🥅 NET BOUNCE");
                }
            }

            setters.forEach((s) => {
                s.y += s.vy; s.vy += BASE_GRAVITY;
                if (s.y > FLOOR_Y - 42) { s.y = FLOOR_Y - 42; s.vy = 0; s.isJumping = false; }
                
                let targetX = s.base;
                if (s.side === 'left') { if (ball.x < canvas.width / 2) targetX = ball.x; } 
                else { if (ball.x >= canvas.width / 2) targetX = ball.x + (ball.vx * 0.4); } 
                s.x += (targetX - s.x) * (s.side === 'right' ? 0.25 : 0.15); 
                
                if (s.side === 'left') { if (s.x < 60) s.x = 60; if (s.x > 790) s.x = 790; } 
                else { if (s.x < 910) s.x = 910; if (s.x > 1640) s.x = 1640; }

                if (s.side === 'left' && ball.x > NET_X) return;
                if (s.side === 'right' && ball.x < NET_X) return;

                if (ballTouchCooldown === 0 && Math.sqrt((ball.x - s.x)**2 + (ball.y - s.y)**2) < ball.radius + 55) {
                    let sideKey = s.side; teamTouchCount[sideKey]++; ballTouchCooldown = 25; 
                    if(teamTouchCount[sideKey] > 3) { triggerScore(sideKey === 'left' ? 'p2' : 'p1'); return; }
                    
                    let isQuickReady = (s.side === 'left') ? (players.p1.isJumping && players.p1.x > 460) : (players.p2.isJumping && players.p2.x < 1240);
                    ball.vy = isQuickReady ? -14 : (s.side === 'right' ? -24 : -23);
                    ball.vx = ((s.side === 'left' ? players.p1.x : players.p2.x) - s.x) * 0.05;
                    s.vy = -5; s.isJumping = true; 
                    triggerHit(isQuickReady ? "⚡ QUICK SET" : "🏐 HIGH TOSS");
                }
            });

            Object.keys(players).forEach((pKey, idx) => {
                const p = players[pKey]; let dx = ball.x - p.x; let dy = ball.y - p.y;
                if (p.side === 'left' && ball.x > NET_X) return;
                if (p.side === 'right' && ball.x < NET_X) return;

                if (ballTouchCooldown === 0 && Math.sqrt(dx*dx + dy*dy) < ball.radius + 115) {
                    let actionKey = (idx === 0) ? keys['t'] : ((gameMode === 2) ? keys['enter'] : aiSpikeTrigger);
                    let sideKey = p.side;

                    if (p.isJumping && actionKey) {
                        teamTouchCount[sideKey]++; ballTouchCooldown = 25; 
                        if(teamTouchCount[sideKey] > 3) { triggerScore(sideKey === 'left' ? 'p2' : 'p1'); return; }
                        p.spikingVisualTimer = 18;
                        
                        let isNetZone = (idx === 0) ? (p.x >= 460 && p.x <= 830) : (p.x <= 1240 && p.x >= 870);
                        let isQuick = isNetZone && (ball.vy >= -8 && ball.vy <= 8);

                        if (isQuick) {
                            ball.vx = (idx === 0) ? 36 : -36; ball.vy = 7.5;
                            triggerHit("⚡ QUICK SMASH");
                        } else {
                            let isBack = (idx === 0) ? (p.x < 460) : (p.x > 1240);
                            ball.vx = (idx === 0) ? (isBack ? 27 : 31) : (isBack ? p2SpikePower + 2 : p2SpikePower);
                            ball.vy = isBack ? 1.5 : 4.0;
                            triggerHit("🔥 HARD SMASH");
                        }
                    } else if (ball.vy > 0) { 
                        teamTouchCount[sideKey]++; ballTouchCooldown = 25; 
                        if(teamTouchCount[sideKey] > 3) { triggerScore(sideKey === 'left' ? 'p2' : 'p1'); return; }
                        ball.vy = -16.5; ball.vx = (idx === 0) ? 5 : -5; 
                        triggerHit("🛡️ RECEIVE");
                    }
                }
            });

            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) ball.vx *= -1;
            if (ball.x < canvas.width / 2) { teamTouchCount.right = 0; } else { teamTouchCount.left = 0; }
            
            if (ball.y + ball.radius >= FLOOR_Y) { 
                ball.y = FLOOR_Y - ball.radius;
                triggerScore(ball.x < canvas.width / 2 ? 'p2' : 'p1');
            }
            if (msgTimer > 0) msgTimer--;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let wallGrad = ctx.createLinearGradient(0, 0, 0, FLOOR_Y);
            wallGrad.addColorStop(0, "#030712"); wallGrad.addColorStop(0.7, "#0f172a"); wallGrad.addColorStop(1, "#1e293b");
            ctx.fillStyle = wallGrad; ctx.fillRect(0, 0, canvas.width, FLOOR_Y);

            // 속공 성공 시 백그라운드 플래시 렌더링
            if (msgTimer > 0 && gameMsg.includes("QUICK")) {
                ctx.fillStyle = "rgba(0, 242, 254, 0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            // 고화질 네온 코트 바닥 그라데이션
            let floorGrad = ctx.createLinearGradient(0, FLOOR_Y, 0, canvas.height);
            floorGrad.addColorStop(0, "#0f172a"); floorGrad.addColorStop(1, "#020617");
            ctx.fillStyle = floorGrad; ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
            ctx.fillRect(460, FLOOR_Y, 8, canvas.height - FLOOR_Y); ctx.fillRect(1240, FLOOR_Y, 8, canvas.height - FLOOR_Y);
            ctx.fillRect(0, FLOOR_Y, canvas.width, 6);

            // 🥅 입체 네트 구조물
            ctx.fillStyle = "#38bdf8"; ctx.fillRect(NET_X - NET_W/2, FLOOR_Y - NET_H, NET_W, NET_H);
            ctx.fillStyle = "rgba(0, 242, 254, 0.35)";
            for(let ny = FLOOR_Y - NET_H + 8; ny < FLOOR_Y; ny += 12) { ctx.fillRect(NET_X - NET_W/2, ny, NET_W, 2); }

            // 스파이크 상태일 때 스릴 넘치는 잔상 가속선 그리기
            if (ball.isSmashed && msgTimer > 0) {
                ctx.strokeStyle = gameMsg.includes("QUICK") ? "rgba(0, 242, 254, 0.4)" : "rgba(244, 63, 94, 0.4)";
                ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(ball.x - ball.vx*2, ball.y - ball.vy*2); ctx.lineTo(ball.x, ball.y); ctx.stroke();
            }

            // 수비 반경 오라 가시화
            Object.keys(players).forEach(pKey => {
                let p = players[pKey]; ctx.beginPath(); ctx.arc(p.x, p.y - 10, p.radius + 115, 0, Math.PI * 2);
                ctx.strokeStyle = pKey === 'p1' ? "rgba(0, 242, 254, 0.15)" : "rgba(244, 63, 94, 0.15)";
                ctx.lineWidth = 3; ctx.setLineDash([8, 6]); ctx.stroke(); ctx.setLineDash([]);
            });

            setters.forEach(s => drawHighQualityPlayer(ctx, s.x, s.y, s.isJumping, s.vy, s.color, s.side, s.spikingVisualTimer, "#475569", "wave", "03"));
            Object.keys(players).forEach(pKey => players[pKey].draw());

            // 🏐 프리미엄 볼 이펙트
            ctx.save(); ctx.translate(ball.x, ball.y); ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI*2);
            let ballGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, ball.radius);
            if (ball.isSmashed) {
                ballGrad.addColorStop(0, "#ffffff"); ballGrad.addColorStop(1, gameMsg.includes("QUICK") ? "#00f2fe" : "#f43f5e");
            } else {
                ballGrad.addColorStop(0, "#ffffff"); ballGrad.addColorStop(1, "#cbd5e1");
            }
            ctx.fillStyle = ballGrad; ctx.fill(); ctx.restore();

            if (msgTimer > 0) {
                ctx.font = "italic bold 4rem sans-serif"; ctx.textAlign = "center"; 
                ctx.fillStyle = gameMsg.includes("QUICK") ? "#00f2fe" : (gameMsg.includes("SCORE") ? "#fb7185" : "#38bdf8");
                ctx.fillText(gameMsg, canvas.width / 2, 195);
            }
        }

        function loop() { update(); draw(); if(isGameRunning) requestAnimationFrame(loop); }
    </script>
</body>
</html>
